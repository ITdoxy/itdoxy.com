baseURL: "/"
languageCode: "ru-ru"
defaultContentLanguage: "ru"
title: ITdoxy
theme: PaperMod

permalinks:
  posts: /:slug/

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  ru:
    languageName: "Русский"
    menu:
      main:
        - name: 🧪 Lab
          url: https://lab.itdoxy.com
          weight: 1
        - name: 🏛 Форум
          url: https://t.me/ITdoxyForum
          weight: 2
        - name: 💎 Услуги
          url: https://vk.link/itdoxy
          weight: 3
        - name: 🍩 Донат
          url: https://pay.cloudtips.ru/p/22406f0b
          weight: 4
        - name: 🏷 Категории
          url: /categories/
          weight: 5
        - name: 🏷 Теги
          url: /tags/
          weight: 6
        - name: 🗄 Архив
          url: /archives/
          weight: 7
        - name: 🔎 Поиск
          url: /search/
          weight: 8

outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.

  dateFormat: "02.01.2006"

  ShowReadingTime: true
  ShowShareButtons: true
  comments: true
  defaultTheme: auto
  disableThemeToggle: false

  # opengraph
  title: ITdoxy
  description: Ваш проводник в мир IT
  images:
    - logo.png

  # home-info mode
  homeInfoParams:
    LogoWidth: 350 # custom size
    LogoHeight: 350 # custom size
    Title: "Ваш проводник в мир IT 💻"
    Content: |
      У нас вы сможете найти разнообразные статьи в сфере информационных технологий, посвящённые системному
      и сетевому администрированию, программированию, базам данных, Linux и не только.

  socialIcons:
    - name: telegram
      url: "https://t.me/ITdoxy"
    - name: vk
      url: "https://vk.com/itdoxy"
    - name: x
      url: "https://x.com/ITdoxy"

  ShareButtons: ["x", "linkedin", "reddit", "whatsapp", "telegram", "ycombinator"] # To customize which share buttons to be enabled on page

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
